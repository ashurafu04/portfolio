[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "https://achrafmalki.netlify.app/*"
  to = "https://achrafmalki.dev/:splat"
  status = 301
  force = true

# www → apex canonical redirect
[[redirects]]
  from = "https://www.achrafmalki.dev/*"
  to = "https://achrafmalki.dev/:splat"
  status = 301
  force = true

# SPA fallback — ensures deep links resolve to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security & trust headers (also influence SEO scores)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none';"

# Long-term cache for Vite-hashed assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Short cache for root HTML so updates propagate fast
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# robots.txt and sitemap should always be fresh
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=86400"
